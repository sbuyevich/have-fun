<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Colorful party game background</title>
  <desc id="desc">A playful field of colorful sentence tiles, confetti, and soft shapes.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7d046"/>
      <stop offset="0.45" stop-color="#53c6e8"/>
      <stop offset="1" stop-color="#2f5fb8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#10203f" flood-opacity="0.24"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#sky)"/>
  <circle cx="1320" cy="145" r="190" fill="#ff6b6b" opacity="0.78"/>
  <circle cx="1085" cy="835" r="250" fill="#55d27b" opacity="0.62"/>
  <circle cx="300" cy="820" r="210" fill="#fff2a8" opacity="0.58"/>
  <g opacity="0.85">
    <rect x="1070" y="245" width="34" height="12" rx="6" fill="#ffffff" transform="rotate(22 1087 251)"/>
    <rect x="1230" y="455" width="42" height="14" rx="7" fill="#1f2a44" transform="rotate(-18 1251 462)"/>
    <rect x="805" y="145" width="38" height="12" rx="6" fill="#fffbda" transform="rotate(36 824 151)"/>
    <rect x="615" y="690" width="42" height="14" rx="7" fill="#ffffff" transform="rotate(-28 636 697)"/>
    <rect x="1385" y="735" width="34" height="12" rx="6" fill="#ffd166" transform="rotate(30 1402 741)"/>
    <rect x="450" y="225" width="44" height="14" rx="7" fill="#073b4c" transform="rotate(-15 472 232)"/>
    <circle cx="1165" cy="625" r="12" fill="#ffffff"/>
    <circle cx="1400" cy="360" r="10" fill="#ffd166"/>
    <circle cx="760" cy="785" r="13" fill="#ef476f"/>
    <circle cx="545" cy="405" r="10" fill="#ffffff"/>
  </g>
  <g filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    <g transform="translate(700 330) rotate(-8)">
      <rect width="255" height="112" rx="18" fill="#ffffff"/>
      <text x="128" y="70" text-anchor="middle" font-size="46" fill="#1f2a44">PLAY</text>
    </g>
    <g transform="translate(1000 510) rotate(7)">
      <rect width="300" height="112" rx="18" fill="#073b4c"/>
      <text x="150" y="70" text-anchor="middle" font-size="42" fill="#ffffff">WORDS</text>
    </g>
    <g transform="translate(820 655) rotate(-4)">
      <rect width="335" height="112" rx="18" fill="#ffd166"/>
      <text x="168" y="70" text-anchor="middle" font-size="42" fill="#1f2a44">SCRAMBLE</text>
    </g>
    <g transform="translate(1180 205) rotate(12)">
      <rect width="235" height="102" rx="18" fill="#ef476f"/>
      <text x="118" y="64" text-anchor="middle" font-size="38" fill="#ffffff">JOIN</text>
    </g>
  </g>
</svg>
